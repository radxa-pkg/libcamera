name: Build & Release
on:
  workflow_dispatch:
  pull_request:
  push:
  merge_group:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:noble
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build
        run: |
          apt-get update
          apt-get install --no-install-recommends -y git-buildpackage devscripts
          export DEBEMAIL="dev@radxa.com"
          export DEBFULLNAME='"Radxa Computer Co., Ltd"'
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          apt-get build-dep -y .
          export DEB_BUILD_OPTIONS=nocheck
          debuild -us -uc -b -Pnodoc
      - name: Workaround actions/upload-artifact#176
        run: |
          echo "artifacts_path=$(realpath ..)" >> $GITHUB_ENV
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}
          path: |
            ${{ env.artifacts_path }}/*.deb
  release:
    runs-on: ubuntu-24.04-arm
    needs: build
    if: github.event_name != 'pull_request' && github.event_name != 'merge_group' && github.ref_name == 'resolute-updates'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: ${{ github.event.repository.name }}
      - name: Check if the latest version is releasable
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y devscripts
          version="$(dpkg-parsechangelog -S Version)"
          echo "version=$version" >> $GITHUB_ENV
          echo "changes<<EOF" >> $GITHUB_ENV
          echo '```' >> $GITHUB_ENV
          echo "$(dpkg-parsechangelog -S Changes)" >> $GITHUB_ENV
          echo '```' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          if [[ -n "$(git tag -l "$version")" ]]
          then
            echo "distro=UNRELEASED" >> $GITHUB_ENV
          else
            echo "distro=$(dpkg-parsechangelog -S Distribution)" >> $GITHUB_ENV
          fi
          echo "$version" > VERSION
      - name: Release
        if: env.distro != 'UNRELEASED'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.version }}
          body_path: README.md
          token: ${{ secrets.GITHUB_TOKEN }}
          target_commitish: resolute-updates
          draft: false
          fail_on_unmatched_files: false
          files: |
            *.deb
            pkg.conf
            VERSION
      - name: Append changelog
        if: env.distro != 'UNRELEASED'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.version }}
          body: |
            ## Changelog for ${{ env.version }}
            ${{ env.changes }}
          append_body: true
      - name: Update Test repos
        if: env.distro != 'UNRELEASED'
        uses: radxa-repo/update-repo-action@main
        with:
          test-repo: true
          token: ${{ secrets.RADXA_APT_TEST_REPO_TOKEN }}
