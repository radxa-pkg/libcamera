name: Build & Release
on:
  workflow_dispatch:
  pull_request:
  push:
  merge_group:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y git-buildpackage devscripts
          export DEBEMAIL="dev@radxa.com"
          export DEBFULLNAME='"Radxa Computer Co., Ltd"'
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          sudo apt-get build-dep -y .
          export DEB_BUILD_OPTIONS=nocheck
          debuild -us -uc -b -Pnodoc
      - name: Workaround actions/upload-artifact#176
        run: |
          echo "artifacts_path=$(realpath ..)" >> $GITHUB_ENV
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}
          path: |
            ${{ env.artifacts_path }}/*.deb
  release:
    if: "${{ github.event_name != 'pull_request' && needs.build.outputs.distro != 'UNRELEASED' }}"
    needs: "build"
    permissions:
      contents: "write"
    runs-on: ubuntu-24.04-arm
    steps:
    - name: "Checkout"
      uses: "actions/checkout@v7"
    - name: "Download generated debs"
      uses: "actions/download-artifact@v8"
      with:
        name: "${{ github.event.repository.name }}"
        path: ".artifacts"
    - name: "Prepare for release"
      run: |
        version="$(dpkg-parsechangelog -S Version)"
        version="${version//\~/.}"
        {
            echo "version=$version"
            echo "changes<<EOF"
            echo '```'
            echo "$(dpkg-parsechangelog -S Changes)"
            echo '```'
            echo "EOF"
        } | tee -a "$GITHUB_ENV"
        echo "$version" | tee VERSION
        if [[ -f pkg.conf.template ]]
        then
            sed "s/VERSION/$version/g" pkg.conf.template | tee pkg.conf
        fi
      shell: "bash"
    - name: "Release"
      uses: "softprops/action-gh-release@v3"
      with:
        body_path: "README.md"
        draft: false
        fail_on_unmatched_files: false
        files: |
          .artifacts/**/*.deb
          pkg.conf
          VERSION
        prerelease: false
        tag_name: "${{ env.version }}"
        target_commitish: "${{ github.sha }}"
        token: "${{ secrets.GITHUB_TOKEN }}"
    - name: "Append changelog"
      uses: "softprops/action-gh-release@v3"
      with:
        append_body: true
        body: |
          ## Changelog for ${{ env.version }}
          ${{ env.changes }}
        tag_name: "${{ env.version }}"
    - name: "Update Test repos"
      uses: "RadxaOS-SDK/rsdk/.github/actions/infra-repo-update@main"
      with:
        test-repo: true
        token: "${{ secrets.RSDK_APT_REPOSITORY_TOKEN }}"
